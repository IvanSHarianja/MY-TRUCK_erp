name: Deploy to siproper-test

# Auto-deploy: setiap push ke `main` akan men-deploy ke server siproper-test.
# Bisa juga dijalankan manual lewat tab "Actions" (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cegah dua deploy berjalan bersamaan (antri, tidak saling membatalkan).
concurrency:
  group: deploy-siproper-test
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy ke /www/wwwroot/mytruck.siproper.cloud
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          # Seluruh deploy dijalankan sebagai root (sudo bash) karena direktori
          # web ber-permission 700 milik user `www` — user SSH biasa tidak bisa
          # masuk ke dalamnya. Di akhir kepemilikan dikembalikan ke www:www.
          script: |
            sudo bash <<'DEPLOY'
            set -e
            export COMPOSER_ALLOW_SUPERUSER=1
            APP_DIR=/www/wwwroot/mytruck.siproper.cloud
            PHP=/www/server/php/84/bin/php

            echo "==> [1/8] Tandai direktori aman untuk git"
            git config --global --add safe.directory "$APP_DIR"
            cd "$APP_DIR"

            echo "==> [2/8] Tarik kode terbaru dari origin/main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [3/8] Composer install (production)"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "==> [4/8] Build asset frontend (Vite)"
            npm ci
            npm run build

            echo "==> [5/8] Jalankan migrasi database"
            $PHP artisan migrate --force

            echo "==> [6/8] Rebuild cache Laravel"
            $PHP artisan optimize:clear
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache
            $PHP artisan storage:link || true

            echo "==> [7/8] Kembalikan kepemilikan file ke www:www"
            chown -R www:www "$APP_DIR"

            echo "==> [8/8] Reload PHP-FPM 8.4 & Nginx"
            /etc/init.d/php-fpm-84 reload || systemctl reload php-fpm-84 || true
            /etc/init.d/nginx reload || nginx -s reload || true

            echo "==> Deploy selesai"
            DEPLOY
